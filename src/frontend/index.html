<!--MI PERSONA DIGITAL- login y registro-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Persona Digital — Acceso</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Login form -->
        <div class="form-box login">
            <form id="loginForm">
                <h1>Acceso a la cuenta</h1>
                <div class="input-box">
                    <input type="text" id="loginCuil" placeholder="CUIL" required>
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-box">
                    <input type="password" id="loginPassword" placeholder="Contraseña" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div class="forgot-link">
                    <a href="recovery-password.html">¿Olvidaste tu contraseña?</a>
                </div>
                <div id="loginError" class="error-msg hidden">CUIL o contraseña incorrectos.</div>
                <button type="submit" class="btn">Ingresar</button>
            </form>
        </div>

        <!-- Register form -->
        <div class="form-box register">
            <form id="registerForm">
                <h1>Registro</h1>
                <div class="input-box">
                    <input type="text" id="regNombre" placeholder="Nombre" required>
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-box">
                    <input type="text" id="regApellido" placeholder="Apellido" required>
                </div>
                <div class="input-box">
                    <input type="text" id="regDni" placeholder="DNI" required>
                    <i class="fa-solid fa-address-card"></i>
                </div>
                <div class="input-box">
                    <input type="text" id="regCuil" placeholder="CUIL" required>
                </div>
                <div class="input-box">
                    <input type="date" id="regFecha" required>
                </div>
                <div class="input-box">
                    <input type="tel" id="regTelefono" placeholder="Teléfono" required>
                    <i class="fa-solid fa-phone"></i>
                </div>
                <div class="input-box">
                    <input type="email" id="regEmail" placeholder="Email" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="input-box">
                    <input type="password" id="regPassword" placeholder="Contraseña" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div id="registerError" class="error-msg hidden">Completá todos los campos.</div>
                <button type="submit" class="btn">Crear cuenta</button>
            </form>
        </div>

        <!-- Toggle Box -->
        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>¡Bienvenido!</h1>
                <p>¿No tenés una cuenta?</p>
                <button class="btn register-btn">Registrarme</button>
            </div>
            <div class="toggle-panel toggle-right">
                <h1>¡Hola de nuevo!</h1>
                <p>¿Ya tenés una cuenta?</p>
                <button class="btn login-btn">Ingresar</button>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
